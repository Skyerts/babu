<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>For You 💙</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="hearts-layer"></div>

  <div id="bg-slideshow">
    <div class="bg-slide active" style="background-image: url('images/pic1.jpg')"></div>
    <div class="bg-slide" style="background-image: url('images/pic2.jpg')"></div>
    <div class="bg-slide" style="background-image: url('images/pic3.jpg')"></div>
    <div class="bg-slide" style="background-image: url('images/pic4.jpg')"></div>
    <div class="bg-slide" style="background-image: url('images/pic5.jpg')"></div>
  </div>
  <div class="bg-overlay"></div>

  <!-- LANDING PAGE -->
  <div id="landing-page">
    <div class="landing-inner">
      <div class="landing-hearts">💙 &nbsp; 💙 &nbsp; 💙</div>
      <h1 class="landing-title">Hey, babu…</h1>
      <p class="landing-sub">I wrote something just for you.<br>Open it whenever your heart is ready. 💙</p>
      <button id="startBtn">
        <span>Open My Letter</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
    </div>
  </div>

  <!-- MESSAGE PAGE -->
  <div id="message-page" class="hidden">
    <div class="message-card">
      <div class="card-header">
        <div class="progress-bar-wrap">
          <div id="progress-bar"></div>
        </div>
        <span id="page-counter"></span>
      </div>

      <div class="message-body">
        <p id="message-text"></p>
      </div>

      <div class="card-footer">
        <button id="backBtn" class="nav-btn back-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          <span>Back</span>
        </button>
        <button id="nextBtn" class="nav-btn next-btn">
          <span>Next</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- EXIT PAGE -->
  <div id="exit-page" class="hidden">
    <div class="exit-inner">
      <div class="exit-hearts">💙</div>
      <h2 class="exit-title">I love you, babu.</h2>
      <p class="exit-msg">Thank you for reading every word.<br>You are my favorite person in this world,<br>and I'm so lucky you're mine. 💙</p>
      <button id="restartBtn" class="nav-btn next-btn" style="margin-top:2rem;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
        <span>Read Again</span>
      </button>
      <button id="exitBackBtn" class="nav-btn back-btn" style="margin-top:1rem;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        <span>Back</span>
      </button>
    </div>
  </div>

  <audio id="bg-music" src="music/music.mp3" loop></audio>
  <script src="script.js"></script>
</body>
</html>
